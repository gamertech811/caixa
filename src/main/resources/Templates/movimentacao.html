<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Movimentação</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .loud {
            color: #2ecc71;
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: 4px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(46, 204, 113, 0.5);
        }

        .aspas {
            background-color: #141414;
            border-top: 5px solid #2ecc71;
            padding: 30px;
            width: 320px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        h2 {
            margin-top: 0;
            text-align: center;
            color: #fff;
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        .escreve {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 0.75rem;
            margin-bottom: 5px;
            color: #2ecc71;
            font-weight: bold;
        }

        input, select {
            width: 100%;
            padding: 10px;
            background: #222;
            border: 1px solid #333;
            color: white;
            border-radius: 4px;
            box-sizing: border-box;
        }

        input:focus {
            border-color: #2ecc71; outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #2ecc71;
            color: black;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 10px;
        }

        button:hover {
            background-color: #27ae60;
        }

        .sla {
            text-align: center; margin-top: 20px;
        }
        .sla a {
            color: #888; text-decoration: none; font-size: 0.9rem;
        }
        .sla a:hover {
            color: #2ecc71;
        }
        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

    </style>
</head>
<body>

<h1 class="loud">CAIXA DA LOUD</h1>

<div class="aspas">
    <h2>Nova Movimentação</h2>

    <div class="escreve">
        <label>TIPO</label>
        <select id="tipo">
<!--            tipo-->
            <option value="1">ENTRADA</option>
            <option value="2">SAÍDA</option>
        </select>
    </div>

    <div class="escreve">
<!--        ver nun neg-->
        <label>VALOR</label>
        <input type="number" id="valor" placeholder="0.00" min="0">
    </div>

    <div class="escreve">
        <label>DESCRIÇÃO</label>
        <input type="text" id="descricao" placeholder="Ex: Prêmio Camp">
    </div>

    <div class="escreve">
        <label>DATA</label>
        <input type="date" id="data2">
    </div>
    <!--envia os bgl-->
    <button onclick="enviar()">REGISTRAR</button>

    <div class="sla">
        <a href="/caixa/extrato">Ver Extrato Completo</a>
    </div>
</div>
<script src="/script.js">
</script>
</body>
</html>
